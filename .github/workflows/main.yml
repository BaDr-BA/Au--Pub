name: Test Auto Publisher

on:
  workflow_dispatch: # هذا السطر يصنع لنا زراً يدوياً لتشغيل السكريبت متى شئنا للتجربة

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install feedparser

      - name: Run Main Script
        run: python main.py

      - name: Save Memory (published.txt) back to GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add published.txt
          git commit -m "تحديث ذاكرة المقالات" || echo "لا يوجد تحديث"
          git push
