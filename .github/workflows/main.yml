name: Auto Publisher

on:
  workflow_dispatch: # يبقي زر التشغيل اليدوي موجوداً للتجارب
  schedule:
    # هذا السطر السحري (CRON) يجعل السكريبت يعمل تلقائياً كل 15 دقيقة!
    # (يمكنك تغيير إلى */30 ليعمل كل نصف ساعة، أو */60 ليعمل كل ساعة)
    - cron: '*/30 * * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # تم التحديث لتجنب تحذير جوجل

      - name: Install Dependencies
        run: |
          pip install feedparser
          pip install beautifulsoup4
          pip install google-genai
          pip install requests
          pip install tweepy # أضفنا مكتبة تويتر السحرية 🐦

      - name: Run Main Script
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_ACCOUNT_ID: ${{ secrets.THREADS_ACCOUNT_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}
        run: python main.py

      - name: Save Memory
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add published.txt
          git commit -m "تحديث ذاكرة المقالات" || echo "لا يوجد تحديث"
          git push
