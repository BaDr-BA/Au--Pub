name: Test Auto Publisher

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # تم التحديث لتجنب تحذير جوجل

      - name: Install Dependencies
        run: |
          pip install feedparser
          pip install beautifulsoup4
          pip install google-genai
          pip install requests # أضفنا هذه المكتبة للتواصل مع تليجرام

      - name: Run Main Script
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # أضفنا أسرار ميتا هنا 👇
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: python main.py

      - name: Save Memory
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add published.txt
          git commit -m "تحديث ذاكرة المقالات" || echo "لا يوجد تحديث"
          git push
