name: Tech News Publisher
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install feedparser
          pip install beautifulsoup4
          pip install google-genai
          pip install requests
          pip install PyNaCl
      - name: Run Tech News Script
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_ACCOUNT_ID: ${{ secrets.THREADS_ACCOUNT_ID }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ secrets.GH_REPO }}
        run: python tech_news.py
      - name: Save Memory
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tech_published.txt
          git commit -m "تحديث ذاكرة الأخبار التقنية" || echo "لا يوجد تحديث"
          git push
